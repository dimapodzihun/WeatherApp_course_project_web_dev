<ul class="absolute z-50 left-0 right-0 top-full mt-1 bg-white border border-[#E5E7EB] rounded-xl shadow-lg overflow-hidden text-[14px]">
    {% for s in suggestions %}
    <li>
        <button
            type="button"
            class="w-full text-left px-4 py-2.5 hover:bg-blue-50 hover:text-[#2563EB] transition flex items-center gap-3 border-b border-[#F3F4F6] last:border-0"
            onmousedown="
                (function(btn) {
                    var wrapper = btn.closest('[data-search-wrapper]');
                    var inp = wrapper.querySelector('input[type=text]');
                    var box = wrapper.querySelector('[id$=suggestions]');
                    var resultTarget = wrapper.dataset.resultTarget;
                    inp.value = '{{ s.name_en }}';
                    if (box) box.innerHTML = '';
                    htmx.ajax('GET', '/search?q=' + encodeURIComponent('{{ s.name_en }}'), {target: resultTarget || '#search-result', swap: 'innerHTML'});
                })(this)
            ">
            <svg class="w-4 h-4 shrink-0 text-[#9CA3AF]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            <span class="font-medium">{{ s.display }}</span>
        </button>
    </li>
    {% endfor %}
</ul>
