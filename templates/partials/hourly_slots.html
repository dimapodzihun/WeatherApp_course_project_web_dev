<h3 class="text-[20px] font-semibold text-[#1F2937] mt-8">
    Погодинний прогноз
    {% if weekday %}<span class="text-[#2563EB]">({{ weekday }})</span>{% endif %}
</h3>
<div class="bg-white border border-[#E5E7EB] rounded-xl p-5 shadow-sm overflow-x-auto">
    {% if hourly %}
    <div class="flex gap-6 min-w-max pb-2">
        {% for h in hourly %}
        <div class="flex flex-col items-center min-w-[80px]">
            <span class="text-[#6B7280] text-[14px]">{{ h.time }}</span>
            <img src="https://openweathermap.org/img/wn/{{ h.icon }}.png" alt="icon" class="w-10 h-10 my-1">
            <span class="text-[#1F2937] font-bold text-[16px]">{{ h.temperature }}°</span>
            <span class="text-[#6B7280] text-[12px] text-center leading-tight mt-1 max-w-[80px] break-words">{{ h.description|capitalize }}</span>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <p class="text-[#9CA3AF] text-center py-4">Немає погодинних даних для цього дня.</p>
    {% endif %}
</div>
