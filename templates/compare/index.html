{% extends 'base.html' %}

{% block content %}
<div class="max-w-6xl mx-auto space-y-6">
    <div class="bg-white border border-[#E5E7EB] rounded-xl p-6 shadow-sm">
        <h2 class="text-[24px] font-semibold text-[#1F2937] mb-4">Порівняння міст</h2>
        
        <form hx-get="/compare/result" hx-target="#compare-result" hx-indicator=".compare-indicator" class="flex flex-col md:flex-row gap-4 items-end">
            <div class="flex-1 w-full">
                <label class="block text-[13px] text-[#6B7280] mb-1">Місто 1</label>
                <div class="relative" data-search-wrapper data-result-target="#compare-result">
                    <input type="text" name="city1" id="city1-input" required autocomplete="off"
                           class="w-full border border-[#E5E7EB] rounded-lg px-3 py-2 text-[#1F2937] focus:border-[#2563EB] outline-none transition-colors"
                           placeholder="Наприклад, Київ"
                           oninput="
                               if(this.value.length < 2) { document.getElementById('city1-suggestions').innerHTML = ''; }
                               else { htmx.ajax('GET', '/search/suggestions?q=' + encodeURIComponent(this.value), {target: '#city1-suggestions', swap: 'innerHTML'}); }
                           "
                           onblur="setTimeout(() => { document.getElementById('city1-suggestions').innerHTML = ''; }, 200)">
                    <div id="city1-suggestions" class="absolute w-full z-50"></div>
                </div>
            </div>
            <div class="flex-1 w-full">
                <label class="block text-[13px] text-[#6B7280] mb-1">Місто 2</label>
                <div class="relative" data-search-wrapper data-result-target="#compare-result">
                    <input type="text" name="city2" id="city2-input" required autocomplete="off"
                           class="w-full border border-[#E5E7EB] rounded-lg px-3 py-2 text-[#1F2937] focus:border-[#059669] outline-none transition-colors"
                           placeholder="Наприклад, Львів"
                           oninput="
                               if(this.value.length < 2) { document.getElementById('city2-suggestions').innerHTML = ''; }
                               else { htmx.ajax('GET', '/search/suggestions?q=' + encodeURIComponent(this.value), {target: '#city2-suggestions', swap: 'innerHTML'}); }
                           "
                           onblur="setTimeout(() => { document.getElementById('city2-suggestions').innerHTML = ''; }, 200)">
                    <div id="city2-suggestions" class="absolute w-full z-50"></div>
                </div>
            </div>
            <button type="submit" class="bg-[#2563EB] text-white rounded-lg px-6 py-2 h-[42px] font-medium hover:bg-blue-700 transition flex items-center justify-center gap-2 w-full md:w-auto">
                <span class="compare-indicator hidden animate-spin">
                    <svg class="w-5 h-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                </span>
                <span>Порівняти</span>
            </button>
        </form>
    </div>

    <div id="compare-result" class="min-h-[200px]">
        <!-- Результати порівняння завантажуються сюди -->
    </div>
</div>
{% endblock %}
