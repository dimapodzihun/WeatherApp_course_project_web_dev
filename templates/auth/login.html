{% extends 'base.html' %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh]">
    <div class="bg-white border border-[#E5E7EB] rounded-xl p-5 shadow-sm w-full max-w-md">
        <h2 class="text-[24px] font-semibold text-[#1F2937] text-center mb-6">Вхід</h2>
        
        <form method="POST" action="/login" class="space-y-4">
            <!-- Email -->
            <div>
                <label for="email" class="block text-[13px] font-normal text-[#6B7280] mb-1">Email</label>
                <input type="email" id="email" name="email" required
                       class="w-full border border-[#E5E7EB] rounded-lg px-3 py-2 text-[#1F2937] focus:border-[#2563EB] focus:ring-2 focus:ring-blue-200 outline-none transition-colors {% if error %}border-[#DC2626]{% endif %}"
                       placeholder="your@email.com"
                       value="{{ request.form.email if request.form.email else '' }}">
            </div>
            
            <!-- Пароль -->
            <div>
                <label for="password" class="block text-[13px] font-normal text-[#6B7280] mb-1">Пароль</label>
                <div class="relative">
                    <input type="password" id="password" name="password" required
                           class="w-full border border-[#E5E7EB] rounded-lg px-3 py-2 text-[#1F2937] focus:border-[#2563EB] focus:ring-2 focus:ring-blue-200 outline-none transition-colors {% if error %}border-[#DC2626]{% endif %}"
                           placeholder="••••••••">
                    <button type="button" class="absolute inset-y-0 right-0 px-3 text-[#6B7280] hover:text-[#1F2937]" onclick="togglePassword('password')">
                        👁
                    </button>
                </div>
            </div>

            {% if error %}
            <p class="text-[#DC2626] text-sm text-center">{{ error }}</p>
            {% endif %}

            <button type="submit" class="w-full bg-[#2563EB] text-white rounded-lg px-4 py-2 font-medium hover:bg-blue-700 transition-colors mt-2">
                Увійти
            </button>
        </form>
        
        <div class="mt-6 text-center">
            <a href="/register" class="text-[13px] text-[#2563EB] hover:underline">Немає акаунту? Зареєструватись</a>
        </div>
    </div>
</div>

<script>
    function togglePassword(inputId) {
        const input = document.getElementById(inputId);
        if (input.type === 'password') {
            input.type = 'text';
        } else {
            input.type = 'password';
        }
    }
</script>
{% endblock %}
